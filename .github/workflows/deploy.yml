# Argha - 2026-03-01 - Deploy workflow: build API image → GHCR → Azure Container Apps (Phase 7)
name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Cancel any in-progress deploy for the same branch when a new push arrives
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Workflow-level permissions — packages:write needed for GHCR push
permissions:
  contents: read
  packages: write

jobs:
  # ── Build & push API image to GHCR ───────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/dotnet-rag-api:latest" >> $GITHUB_ENV

      - name: Build Docker image
        # Argha - 2026-03-02 - --no-cache prevents stale layer references causing "unknown blob" on GHCR
        run: docker build --no-cache -t ${{ env.IMAGE }} .

      - name: Push Docker image
        run: docker push ${{ env.IMAGE }}

  # ── Deploy API to Azure Container Apps ───────────────────────────────────────
  deploy-api:
    name: Deploy API to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Argha - 2026-03-02 - #8 - Inject Neon Postgres connection string as Container App secret; idempotent
      - name: Set PostgreSQL connection string secret on Container App
        run: |
          az containerapp secret set \
            --name rag-api \
            --resource-group rg-rag-demo \
            --secrets "pg-connection-string=${{ secrets.POSTGRES_CONNECTION_STRING }}"

      # Argha - 2026-03-02 - #8 - Wire secret to env var; safe to re-run on every deploy
      - name: Wire PostgreSQL secret as environment variable
        run: |
          az containerapp update \
            --name rag-api \
            --resource-group rg-rag-demo \
            --set-env-vars "ConnectionStrings__DefaultConnection=secretref:pg-connection-string"

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: rg-rag-demo
          containerAppName: rag-api
          imageToDeploy: ghcr.io/argha713/dotnet-rag-api:latest
