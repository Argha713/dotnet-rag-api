<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Chat</title>
    <base href="/" />
    <link rel="icon" href="data:," />
    <!-- Argha - 2026-03-20 - #59 - Dark Orbital Theme: Syne (display) + DM Sans (body) -->

    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

<body>
    <div id="app">
        <!-- Argha - 2026-03-20 - #59 - Loading spinner updated to dark orbital theme colors -->
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#060608;flex-direction:column;gap:12px;">
            <div style="width:40px;height:40px;border:3px solid rgba(0,217,192,0.18);border-top-color:#00d9c0;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
            <p style="font-family:'DM Sans',sans-serif;font-size:0.875rem;color:#8a8a9a;margin:0;">Loading RAG Chat…</p>
            <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">&#10006;</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
